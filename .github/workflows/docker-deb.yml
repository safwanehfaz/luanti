name: Build Luanti Debian Package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build .deb in Docker
        run: |
          docker build -t luanti-builder .

      - name: Extract .deb from Docker
        run: |
          container_id=$(docker create luanti-builder)
          docker cp $container_id:/usr/src/luanti-custom.deb ./luanti-custom.deb
          docker rm $container_id

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luanti-deb-package
          path: luanti-custom.deb